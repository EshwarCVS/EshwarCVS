name: Daily Profile Update

on:
  schedule:
    # Runs at 06:00 UTC every day (midnight CST)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scan for leaked secrets
        uses: FasterApiWeb/leash-secrets/action@leash-secrets-v1.2.1
        with:
          scan-mode: diff
          fail-on: critical

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Re-score featured repos (weekly rubric)
        run: python scripts/score_featured_repos.py --apply

      - name: Fetch activity data
        run: python scripts/fetch_activity.py

      - name: Generate README
        run: python scripts/generate_readme.py

      - name: Commit and push
        run: |
          git config user.name "EshwarCVS"
          git config user.email "thedlaeshwar@gmail.com"
          git add -A
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          if git diff --quiet --cached; then
            git commit --allow-empty -m "chore: daily profile update — ${TIMESTAMP}"
          else
            git commit -m "chore: daily profile update — ${TIMESTAMP}"
          fi
          git push
